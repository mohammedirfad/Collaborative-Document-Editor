services:
  postgres:
    image: postgres:16-alpine
    container_name: house-edtech-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: house_edtech
    ports:
      - "5432:5432"
    volumes:
      - house_edtech_pgdata:/var/lib/postgresql/data

volumes:
  house_edtech_pgdata:
